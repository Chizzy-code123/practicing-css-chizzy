<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transformations</title>
    <style>
      .loader {
        border-radius: 50%;
        width: 50px;
        height: 50px;
        background: radial-gradient(circle, #4a90e2 0%, #9013fe 100%);
        margin-top: 50px;
        animation: jump 0.5s ease-out infinite alternate;
      }

      @keyframes jump {
        0% {
          transform: translateY(100px) rotate(0deg);
        }
        100% {
          transform: translateY(-40px) rotate(360deg) scale(0.8, 0.8);
        }
      }
    </style>
  </head>
  <body>
    <div class="loader"></div>

    <svg class="spinner" viewBox="0 0 66 66" xmlns="https://www.w3.org/2000/svg">
      <circle class="path spinner-border" cx="33" cy="33" r="31" stroke="url(#gradient)" /></svg></circle>

    </svg>
  </body>
</html>
